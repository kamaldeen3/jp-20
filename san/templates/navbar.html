{% load static %}
<link rel="stylesheet" type="text/css" href="{% static 'styles/navbar.css' %}">
<div class="nav">
  <input type="checkbox" id="nav-check">
  <div class="nav-header">
    <a class="nav-title" href="{% url 'home' %}">Tutoring</a>
  </div>
  <div class="nav-btn">
    <label for="nav-check">
      <span></span>
      <span></span>
      <span></span>
    </label>
  </div>
  
  <div class="nav-links">
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'services' %}">Services</a>
    <a href="{% url 'about' %}">About</a>
    <a href="{% url 'profile' %}">Profile</a>
    {% if request.user.is_authenticated %}
      <a href="{% url 'logout' %}">Logout</a>
    {% else %}
      <a href="{% url 'login' %}">Login</a>
    {% endif %}
    
    <button id="dark-mode-toggle" class="dark-mode-btn" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="dark-mode-icon">🌙</span>
    </button>


    <!-- Accessibility toggle button -->
    <button
      type="button"
      class="a11y-toggle"
      id="a11yToggle"
      aria-haspopup="true"
      aria-expanded="false"
      aria-controls="a11yPanel"
      title="Accessibility options"
    >
      Aa
    </button>

    <!-- Accessibility dropdown panel -->
    <div class="a11y-panel" id="a11yPanel" hidden>
      <div class="a11y-row">
        <button type="button" class="a11y-btn" id="fontDown" aria-label="Decrease text size">A−</button>

        <input type="range" id="fontScale" min="85" max="130" step="5" value="100"
               aria-label="Font size slider">

        <button type="button" class="a11y-btn" id="fontUp" aria-label="Increase text size">A+</button>
      </div>

      <button type="button" class="a11y-btn a11y-reset" id="fontReset" aria-label="Reset text size">
        Reset
      </button>

      <div class="a11y-contrast">
        <label class="a11y-switch">
          <input type="checkbox" id="contrastToggle">
          <span>High contrast</span>
        </label>
      </div>
    </div>
  </div>
  </div>
</div>

<script src="{% static 'js/darkmode.js' %}"></script>
